name: Production Deploy

on:
  push:
    branches:
      - main   # запускается только при пуше в main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Устанавливаем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Устанавливаем зависимости
      - name: Install dependencies
        run: npm install

      # 4️⃣ Собираем проект
      - name: Build production
        run: npm run build:production

      # 5️⃣ Отправляем dist на сервер через rsync
      - name: Deploy to production server
        env:
          REMOTE_USER: ${{ secrets.PROD_USER }}
          REMOTE_HOST: ${{ secrets.PROD_HOST }}
          REMOTE_DIR: ${{ secrets.PROD_DIR }}
        run: |
          rsync -avz --progress --exclude=".htaccess" dist/ $REMOTE_USER@$REMOTE_HOST:$REMOTE_DIR/
