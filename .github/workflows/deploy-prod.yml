name: Production Deploy

on:
  push:
    branches:
      - main   # запускается только при пуше в main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Устанавливаем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Устанавливаем зависимости
      - name: Install dependencies
        run: npm install

      # 4️⃣ Собираем проект
      - name: Build production
        run: npm run build:production

      #  Настраиваем SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      # 5️⃣ Отправляем dist на сервер через rsync
      - name: Deploy to production server
        env:
          REMOTE_USER: ${{ secrets.PROD_USER }}
          REMOTE_HOST: ${{ secrets.PROD_HOST }}
          REMOTE_DIR: ${{ secrets.PROD_DIR }}
        run: |
          RELEASE=$(date +%Y%m%d%H%M%S)

          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST \
            "mkdir -p $REMOTE_DIR/releases/$RELEASE"
          rsync -avz --progress -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" --exclude=".htaccess" dist/  \
            $REMOTE_USER@$REMOTE_HOST:$REMOTE_DIR/releases/$RELEASE/
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST \
            "ln -sfn $REMOTE_DIR/releases/$RELEASE $REMOTE_DIR/current"
